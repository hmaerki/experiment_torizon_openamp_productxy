# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-projectxy"
BBFILE_PATTERN_meta-projectxy = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-projectxy = "6"

LAYERDEPENDS_meta-projectxy = "core"
LAYERSERIES_COMPAT_meta-projectxy = "scarthgap"
